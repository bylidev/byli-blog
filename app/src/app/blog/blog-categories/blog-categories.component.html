<section class="menu-section">
  <ng-container *ngFor="let item of this.menu | async">
    <mat-chip
      mat-flat-button
      (click)="navigateToTag(item.tag)"
      [ngClass]="{
        'chip-primary': isSelected(item.tag),
      }"
      cdkDrag
    >
      {{ item.tag }}
    </mat-chip>
  </ng-container>
</section>
